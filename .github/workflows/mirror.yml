name: StoneAnalysis CI & Mirror

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # --- JOB 1: VALIDATION DE LA BRANCHE (Uniquement pour PR sur main) ---
  check-branch:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Vérifie que la source est bien 'dev'
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ Merge sur main autorisé uniquement depuis 'dev'."
            echo "   Branche détectée : ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source valide : dev → main"

  # --- JOB 2: TESTS & COMPILATION VIA MAKEFILE ---
  build-and-test:
    runs-on: ubuntu-latest
    # Si c'est une PR sur main, on attend d'abord la validation de la branche
    needs: [check-branch]
    if: always() && (needs.check-branch.result == 'success' || needs.check-branch.result == 'skipped')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy (Linter)
        run: cargo clippy -- -D warnings

      - name: Run Cargo Tests
        run: cargo test --verbose

      # CRUCIAL POUR EPITECH: On teste la compilation officielle via ton Makefile
      - name: Test Epitech Makefile compilation
        run: |
          make all
          if [ ! -f ./stone_analysis ]; then
            echo "❌ Le binaire 'stone_analysis' n'a pas été trouvé à la racine après un 'make' !"
            exit 1
          fi
          echo "✅ Compilation Makefile OK, binaire présent."
          make fclean
          if [ -f ./stone_analysis ] || [ -d ./target ]; then
            echo "❌ 'make fclean' n'a pas correctement nettoyé le binaire ou le dossier target."
            exit 1
          fi
          echo "✅ Nettoyage Makefile OK."

  # --- JOB 3: PUSH VERS LE MIROIR EPITECH ---
  mirror_to_epitech:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    # S'exécute uniquement si le build/test a réussi ET qu'on pousse sur main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # Correction du keyscan pour github.com (dépôt Epitech hébergé sur GitHub)
      - name: Push to Epitech
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # On nettoie un ancien miroir potentiel puis on pousse
          git remote remove epitech 2>/dev/null || true
          git remote add epitech git@github.com:EpitechPGE2-2025/G-CNA-400-MPL-4-1-stoneanalysis-1.git
          
          git push epitech main --force